<!DOCTYPE html>
<html>
<head>
    <title>Student Grade System</title>
</head>
<body>

    <h2>Student Grade System</h2>

    <input type="text" id="name" placeholder="Student Name">
    <br><br>

    <input type="number" id="mark" placeholder="Enter Mark">
    <br><br>

    <button onclick="checkGrade()">Check Grade</button>

    <h3 id="result"></h3>

    <script>
        function checkGrade() {
            let name = document.getElementById("name").value;
            let mark = Number(document.getElementById("mark").value);

            let grade;

            if (mark >= 90) {
                grade = "A";
            } else if (mark >= 75) {
                grade = "B";
            } else if (mark >= 50) {
                grade = "C";
            } else {
                grade = "Fail";
            }

            document.getElementById("result").innerHTML =
                "Student Name: " + name +
                "<br>Mark: " + mark +
                "<br>Grade: " + grade;
        }
    </script>

</body>
</html>
